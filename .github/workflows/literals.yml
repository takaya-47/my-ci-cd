name: Literals
on: push
jobs:
    dump:
        runs-on: ubuntu-latest
        steps:
            - run: echo "${CONTEXT}"
              env:
                  CONTEXT: ${{ toJSON(github) }} # コンテキストのJSON文字列化
    print:
        runs-on: ubuntu-latest
        needs: dump
        steps:
            - run: echo ${{ join(github.event.commits.*.author.name, ' ') }}