name: pull_request
on: pull_request
jobs:
  pull_request:
    name: pull_request
    runs-on: ubuntu-latest
    permissions:           # GITHUB_TOKENの権限を指定
      pull-requests: write # プルリクエストの書き込みを許可
      contents: read       # ソースコードの読み込みを許可
    steps:
      - uses: actions/checkout@v4 # コードを実行マシン上にチェックアウト
      - run: gh pr create --title "Pull Request from GitHub Actions" --body "This pull request was created by GitHub Actions." --base main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # GitHub CLI用クレデンシャル