name: Reusable Workflows
on:
    workflow_call:
        inputs:
            pr-number:
                type: string
                default: ""
                required: true
                description: "コメントを投稿したいPRの番号"
        secrets:
            token:
                required: true
                description: "GitHubトークン"
        outputs:
            comment:
                value: ${{ jobs.comment.outputs.comment}}
                description: "PRに投稿されたコメント"
jobs:
    comment:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
        steps:
            - name: "リポジトリにチェックアウト"
              uses: actions/checkout@v4
            - name: "PRにコメントを投稿"
              id: comment
              shell: bash
              run: |
                body="Welcome, ${ACTOR}"
                gh pr comment "${PR_NUMBER}" --body "${body}"
                echo "body=${body}" >> "${GITHUB_OUTPUT}"
              env:
                ACTOR: ${{ github.actor }}
                PR_NUMBER: ${{inputs.pr-number }}
        outputs:
            comment: ${{ steps.comment.outputs.body }}